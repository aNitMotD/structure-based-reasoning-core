# ==============================
# Gate Schema
# Purpose:
#   A mandatory boundary gate that prevents automation from crossing
#   human judgment and responsibility lines.
# ==============================

gate_core:
  purpose: "..."
  # [REQUIRED]
  # 1–2 lines stating what the automation DOES and DOES NOT do.
  # Example:
  # "Generate a draft summary. Does not make decisions, recommendations, or external actions."

  output_channel: "internal"
  # [REQUIRED]
  # Intended destination of the output.
  # internal | external | public

  risk_gate: "HUMAN_REVIEW"
  # [REQUIRED]
  # Default behavior when high risk is detected.
  # STOP           : stop immediately, no output
  # HUMAN_REVIEW   : normal termination with "human review required"
  # EVIDENCE_ONLY  : collect evidence only, no conclusions

  human_gate_question: "Does this task involve external delivery, publication, or action? (Y/N)"
  # [REQUIRED]
  # The single mandatory human judgment question.
  # If YES, automation must not proceed.

  evidence_minimum: "LOGS"
  # [REQUIRED]
  # Minimum evidence that must accompany the output.
  # LINKS | LOGS
  # NONE is not allowed.

  trace:
    schema_id: "..."
    # [REQUIRED]
    # Identifier of the judgment context being applied.

    schema_hash: "sha256:..."
    # [RECOMMENDED]
    # Integrity reference of this schema.

gate_tuning:
  action_class: "draft"
  # [REQUIRED]
  # Allowed action type:
  # summarize | extract | classify | draft | recommend | execute

  unsafe_output_frames:
    # [REQUIRED]
    # English is easy to evade with synonyms. Do NOT rely on single-word bans.
    # Use "frames" (sentence-function patterns) instead.
    #
    # Matching rule suggestion (simple mode):
    # - Case-insensitive substring match
    # - Support '*' wildcard meaning "any text"
    # - Treat these patterns as escalation triggers, not perfect blockers

    decision_frames:
      # Decision/recommendation intent frames (typically forbidden for summarize/draft/extract/classify)
      - "you should *"
      - "you must *"
      - "it is recommended *"
      - "we recommend *"
      - "the best * is *"
      - "the only * is *"
      - "the correct * is *"
      - "the answer is *"

    conclusion_frames:
      # Hard-closure / conclusion framing (often risky for summarize/draft)
      - "in conclusion *"
      - "therefore *"
      - "thus *"
      - "this means *"
      - "we can conclude *"

    authority_frames:
      # Authority/certainty assertions (risky across most action classes)
      - "there is no doubt *"
      - "it is certain *"
      - "definitely *"
      - "clearly *"
      - "undeniably *"

    action_frames:
      # Execution/operation directives (should trigger escalation in most workflows)
      - "go ahead and *"
      - "proceed to *"
      - "execute *"
      - "apply *"
      - "deploy *"

  frame_policy_by_action:
    # [REQUIRED]
    # For each action_class, define which frame groups are disallowed.
    summarize:
      deny: ["decision_frames", "authority_frames", "action_frames"]
    extract:
      deny: ["decision_frames", "authority_frames", "action_frames"]
    classify:
      deny: ["decision_frames", "authority_frames", "action_frames"]
    draft:
      deny: ["decision_frames", "conclusion_frames", "authority_frames", "action_frames"]
    recommend:
      # Recommendations are allowed, but certainty/authority and execution directives are not.
      deny: ["authority_frames", "action_frames"]
    execute:
      # Generally keep execute heavily restricted or disallowed in this framework.
      deny: ["decision_frames", "conclusion_frames", "authority_frames", "action_frames"]

  evidence_binding:
    # [REQUIRED]
    # Prevents "plausible-sounding text" from passing without evidence.
    require_evidence_for_claims: true
    min_evidence_items: 2
    max_uncited_sentences: 1

options:
  preflight:
    fail_on_missing_fields: true
    # If any required gate field is missing or empty, execution must stop.

    forbid_inventing_values: true
    # Gate values must never be guessed or invented by the system.

  checks:
    enabled: true
    # Enables the automated guards below.

    action_guard:
      enabled: true
      # Enforce action_class boundaries using frames + local heuristics.
      # If a denied frame is matched, escalate to human review.

    evidence_guard:
      enabled: true
      # Enforce evidence binding constraints.
      # If violated, escalate to human review.

    on_violation: "HUMAN_REVIEW_REQUIRED"
    # HUMAN_REVIEW_REQUIRED | STOP
